<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fourier</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #ccc;
  font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
  font-size: 13px;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  user-select: none;
  -webkit-user-select: none;
}

canvas {
  position: absolute;
  top: 0; left: 0;
  touch-action: none;
}

#controls {
  position: absolute;
  top: 12px;
  left: 12px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: rgba(10, 10, 10, 0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 12px;
  border-radius: 6px;
  border: 1px solid #222;
  min-width: 200px;
}

#controls label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}

#controls input[type="range"] {
  flex: 1;
  accent-color: #4a9eff;
  max-width: 120px;
}

#controls button {
  background: #1a1a1a;
  color: #ccc;
  border: 1px solid #333;
  padding: 6px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  min-height: 32px;
}
#controls button:hover { background: #252525; border-color: #444; }
#controls button.active { background: #1a3a5c; border-color: #4a9eff; color: #4a9eff; }

.btn-row {
  display: flex;
  gap: 4px;
}
.btn-row button { flex: 1; }

#info {
  position: absolute;
  bottom: 12px;
  left: 12px;
  z-index: 10;
  color: #555;
  font-size: 11px;
}

#prompt {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #333;
  font-size: 18px;
  pointer-events: none;
  text-align: center;
  line-height: 1.6;
}
#prompt.hidden { display: none; }
.hidden { display: none; }

.slider-val {
  min-width: 28px;
  text-align: right;
  color: #666;
  font-size: 11px;
}
</style>
</head>
<body>

<canvas id="mainCanvas"></canvas>

<div id="controls">
  <div class="btn-row">
    <button id="btnDraw" class="active">Draw</button>
    <button id="btnUpload">Upload</button>
  </div>
  <div class="btn-row" id="playbackControls" style="display:none">
    <button id="btnPlay">Play</button>
    <button id="btnPause">Pause</button>
    <button id="btnReset">Reset</button>
  </div>
  <label id="circleControl" style="display:none">
    Circles <input type="range" id="circleSlider" min="1" max="100" value="50">
    <span class="slider-val" id="circleVal">50</span>
  </label>
  <label id="speedControl" style="display:none">
    Speed <input type="range" id="speedSlider" min="1" max="200" value="50">
    <span class="slider-val" id="speedVal">50</span>
  </label>
  <label id="fadeControl" style="display:none">
    Fade <input type="range" id="fadeSlider" min="0" max="100" value="80">
    <span class="slider-val" id="fadeVal">80%</span>
  </label>
  <label id="optimControl" style="display:none">
    Optim <input type="range" id="optimSlider" min="0" max="1000" value="0" step="10">
    <span class="slider-val" id="optimVal">0</span>
  </label>
  <div class="btn-row" id="presetRow">
    <select id="presetSelect" style="flex:1;background:#1a1a1a;color:#ccc;border:1px solid #333;border-radius:4px;padding:5px;font-family:inherit;font-size:12px;min-height:32px">
      <option value="">Presets...</option>
      <option value="square">Square</option>
      <option value="star">Star</option>
      <option value="heart">Heart</option>
      <option value="infinity">Infinity</option>
    </select>
  </div>
  <button id="btnSpectrum" style="display:none">Spectrum</button>
  <button id="btnOverlay" style="display:none">Show Original</button>
  <button id="btnCopyLink" style="display:none">Copy Link</button>
  <button id="btnClear" style="display:none">Clear</button>
</div>

<div id="prompt">Draw something</div>
<div id="processing" class="hidden" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#4a9eff;font-size:14px;z-index:20;pointer-events:none"></div>
<div id="info"></div>

<input type="file" id="fileInput" accept="image/*" style="display:none">

<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
<script>
// ============================================================
// Canvas setup
// ============================================================
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;

function resize() {
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// State
// ============================================================
let mode = 'draw'; // 'draw' | 'animate'
let drawingPoints = [];
let isDrawing = false;
let coefficients = []; // {freq, amp, phase, re, im}
let numCircles = 50;
let animSpeed = 50;
let animTime = 0;
let animPlaying = false;
let trail = [];
const MAX_TRAIL = 4000;
let trailFade = 80; // 0 = no fade (full trail), 100 = instant vanish
let showOverlay = false;
let showSpectrum = false;
let originalPath = []; // resampled original path for comparison overlay
let viewZoom = 1;
let viewPanX = 0, viewPanY = 0;
let pinchDist0 = 0; // initial pinch distance

// ============================================================
// UI wiring
// ============================================================
const $ = id => document.getElementById(id);

$('btnDraw').addEventListener('click', () => enterDrawMode());
$('btnUpload').addEventListener('click', () => $('fileInput').click());
$('fileInput').addEventListener('change', handleFileUpload);

$('btnPlay').addEventListener('click', () => { animPlaying = true; });
$('btnPause').addEventListener('click', () => { animPlaying = false; });
$('btnReset').addEventListener('click', () => { animTime = 0; trail = []; });
$('btnSpectrum').addEventListener('click', () => {
  showSpectrum = !showSpectrum;
  $('btnSpectrum').classList.toggle('active', showSpectrum);
});
$('btnOverlay').addEventListener('click', () => {
  showOverlay = !showOverlay;
  $('btnOverlay').textContent = showOverlay ? 'Hide Original' : 'Show Original';
  $('btnOverlay').classList.toggle('active', showOverlay);
});
$('btnCopyLink').addEventListener('click', () => {
  if (coefficients.length === 0) return;
  const active = coefficients.slice(0, Math.min(numCircles, coefficients.length));
  let url;
  if (active.length <= 20) {
    // Human-readable for small counts
    const parts = active.map(c =>
      `${c.freq}:${c.amp.toFixed(2)}:${c.phase.toFixed(4)}`
    );
    url = location.origin + location.pathname + '#h=' + parts.join(',');
  } else {
    // Binary compressed
    url = location.origin + location.pathname + '#c=' + encodeCoefficients(active);
  }
  navigator.clipboard.writeText(url).then(() => {
    $('btnCopyLink').textContent = 'Copied!';
    setTimeout(() => { $('btnCopyLink').textContent = 'Copy Link'; }, 1500);
  });
});
$('btnClear').addEventListener('click', () => enterDrawMode());

$('circleSlider').addEventListener('input', e => {
  numCircles = parseInt(e.target.value);
  $('circleVal').textContent = numCircles;
  trail = []; animTime = 0;
});
$('speedSlider').addEventListener('input', e => {
  animSpeed = parseInt(e.target.value);
  $('speedVal').textContent = animSpeed;
});
$('fadeSlider').addEventListener('input', e => {
  trailFade = parseInt(e.target.value);
  $('fadeVal').textContent = trailFade + '%';
});
$('optimSlider').addEventListener('input', e => {
  $('optimVal').textContent = e.target.value;
  if (coefficients.length > 0) {
    const target = parseInt(e.target.value);
    if (target > 100) {
      $('processing').textContent = 'Optimizing...';
      $('processing').classList.remove('hidden');
      setTimeout(() => {
        runOptimization(target);
        $('processing').classList.add('hidden');
      }, 20);
    } else {
      runOptimization(target);
    }
  }
});

function showAnimControls(maxCircles) {
  $('circleSlider').max = maxCircles;
  numCircles = Math.min(numCircles, maxCircles);
  $('circleSlider').value = numCircles;
  $('circleVal').textContent = numCircles;
  $('playbackControls').style.display = '';
  $('circleControl').style.display = '';
  $('speedControl').style.display = '';
  $('fadeControl').style.display = '';
  $('optimControl').style.display = '';
  $('btnSpectrum').style.display = '';
  $('btnOverlay').style.display = '';
  $('btnCopyLink').style.display = '';
  $('btnClear').style.display = '';
  $('prompt').classList.add('hidden');
}

function hideAnimControls() {
  $('playbackControls').style.display = 'none';
  $('circleControl').style.display = 'none';
  $('speedControl').style.display = 'none';
  $('fadeControl').style.display = 'none';
  $('optimControl').style.display = 'none';
  $('btnSpectrum').style.display = 'none';
  $('btnOverlay').style.display = 'none';
  $('btnCopyLink').style.display = 'none';
  $('btnClear').style.display = 'none';
}

function enterDrawMode() {
  mode = 'draw';
  drawingPoints = [];
  coefficients = [];
  trail = [];
  animTime = 0;
  animPlaying = false;
  showOverlay = false;
  showSpectrum = false;
  originalPath = [];
  viewZoom = 1;
  hideAnimControls();
  $('prompt').classList.remove('hidden');
  $('prompt').textContent = 'Draw something';
  $('btnDraw').classList.add('active');
  $('btnUpload').classList.remove('active');
  $('btnOverlay').textContent = 'Show Original';
  $('btnOverlay').classList.remove('active');
  $('btnSpectrum').classList.remove('active');
  $('optimSlider').value = 0;
  $('optimVal').textContent = '0';
}

function enterAnimMode(points) {
  const resampled = resamplePath(points, 1024);
  originalPath = resampled.slice();
  rawCoefficients = computeDFT(resampled);
  coefficients = rawCoefficients.slice();
  optimIterations = 0;

  mode = 'animate';
  animTime = 0;
  trail = [];
  animPlaying = true;

  numCircles = Math.min(Math.floor(coefficients.length / 2), 200);
  showAnimControls(coefficients.length);
  $('circleSlider').value = numCircles;
  $('circleVal').textContent = numCircles;
  $('btnDraw').classList.remove('active');
}

// ============================================================
// Drawing input
// ============================================================
canvas.addEventListener('pointerdown', e => {
  if (mode !== 'draw') return;
  isDrawing = true;
  drawingPoints = [];
  drawingPoints.push({ x: e.clientX, y: e.clientY });
  $('prompt').classList.add('hidden');
});

canvas.addEventListener('pointermove', e => {
  if (!isDrawing) return;
  drawingPoints.push({ x: e.clientX, y: e.clientY });
});

canvas.addEventListener('pointerup', () => {
  if (!isDrawing) return;
  isDrawing = false;
  if (drawingPoints.length > 10) {
    enterAnimMode(drawingPoints);
  }
});

// Pinch-to-zoom and scroll-to-zoom
canvas.addEventListener('wheel', e => {
  if (mode !== 'animate') return;
  e.preventDefault();
  const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
  viewZoom = Math.max(0.1, Math.min(10, viewZoom * zoomFactor));
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2 && mode === 'animate') {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchDist0 = Math.sqrt(dx * dx + dy * dy);
  }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && mode === 'animate' && pinchDist0 > 0) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    viewZoom = Math.max(0.1, Math.min(10, viewZoom * (dist / pinchDist0)));
    pinchDist0 = dist;
  }
}, { passive: true });

// ============================================================
// Presets
// ============================================================
$('presetSelect').addEventListener('change', e => {
  const shape = e.target.value;
  if (!shape) return;
  const points = generatePreset(shape);
  if (points.length > 10) enterAnimMode(points);
  e.target.value = '';
});

function generatePreset(name) {
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  const r = Math.min(window.innerWidth, window.innerHeight) * 0.25;
  const n = 512;
  const pts = [];

  if (name === 'square') {
    const sides = [
      (t) => ({ x: cx - r + 2*r*t, y: cy - r }),
      (t) => ({ x: cx + r, y: cy - r + 2*r*t }),
      (t) => ({ x: cx + r - 2*r*t, y: cy + r }),
      (t) => ({ x: cx - r, y: cy + r - 2*r*t })
    ];
    const perSide = Math.floor(n / 4);
    for (let s = 0; s < 4; s++) {
      for (let i = 0; i < perSide; i++) {
        pts.push(sides[s](i / perSide));
      }
    }
  } else if (name === 'star') {
    for (let i = 0; i < n; i++) {
      const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
      const spoke = i % 2 === 0 ? r : r * 0.4;
      // 5-pointed star: alternate between outer and inner radius
      const starAngle = (Math.floor(i / (n / 10)) / 10) * 2 * Math.PI - Math.PI / 2;
      const frac = (i % (n / 10)) / (n / 10);
      const a1 = (Math.floor(i / (n / 10)) / 10) * 2 * Math.PI - Math.PI / 2;
      const nextPt = (Math.floor(i / (n / 10)) + 1) % 10;
      const a2 = (nextPt / 10) * 2 * Math.PI - Math.PI / 2;
      const r1 = Math.floor(i / (n / 10)) % 2 === 0 ? r : r * 0.4;
      const r2 = nextPt % 2 === 0 ? r : r * 0.4;
      pts.push({
        x: cx + (r1 * Math.cos(a1) * (1 - frac) + r2 * Math.cos(a2) * frac),
        y: cy + (r1 * Math.sin(a1) * (1 - frac) + r2 * Math.sin(a2) * frac)
      });
    }
  } else if (name === 'heart') {
    for (let i = 0; i < n; i++) {
      const t = (i / n) * 2 * Math.PI;
      const hx = 16 * Math.pow(Math.sin(t), 3);
      const hy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
      pts.push({ x: cx + hx * r / 17, y: cy + hy * r / 17 });
    }
  } else if (name === 'infinity') {
    for (let i = 0; i < n; i++) {
      const t = (i / n) * 2 * Math.PI;
      // Lemniscate of Bernoulli
      const s = Math.cos(2 * t);
      if (s < 0) {
        // Mirror for full figure-8
        const t2 = t + Math.PI;
        const s2 = Math.cos(2 * t2);
        const rr = s2 > 0 ? Math.sqrt(s2) : 0;
        pts.push({ x: cx - rr * Math.cos(t2) * r, y: cy + rr * Math.sin(t2) * r * 0.6 });
      } else {
        const rr = Math.sqrt(s);
        pts.push({ x: cx + rr * Math.cos(t) * r, y: cy + rr * Math.sin(t) * r * 0.6 });
      }
    }
  }
  return pts;
}

// ============================================================
// Image upload
// ============================================================
function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  loadImageFile(file);
  e.target.value = '';
}

function loadImageFile(file) {
  if (!file.type.startsWith('image/')) return;
  const img = new Image();
  img.onload = () => {
    $('processing').textContent = 'Detecting edges...';
    $('processing').classList.remove('hidden');
    // Defer so the status message renders before blocking work
    setTimeout(() => {
      const points = extractEdgePoints(img);
      $('processing').classList.add('hidden');
      if (points.length > 10) {
        enterAnimMode(points);
        $('btnUpload').classList.add('active');
        $('btnDraw').classList.remove('active');
      }
    }, 20);
  };
  img.src = URL.createObjectURL(file);
}

// Drag-drop
document.addEventListener('dragover', e => { e.preventDefault(); });
document.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) loadImageFile(file);
});

// ============================================================
// Edge detection (Canny-lite)
// ============================================================
function extractEdgePoints(img) {
  // Draw image to offscreen canvas, scaled to fit
  const maxDim = 400;
  const scale = Math.min(maxDim / img.width, maxDim / img.height, 1);
  const w = Math.round(img.width * scale);
  const h = Math.round(img.height * scale);

  const oc = new OffscreenCanvas(w, h);
  const octx = oc.getContext('2d');
  octx.drawImage(img, 0, 0, w, h);
  const imageData = octx.getImageData(0, 0, w, h);
  const data = imageData.data;

  // Grayscale
  const gray = new Float32Array(w * h);
  for (let i = 0; i < w * h; i++) {
    gray[i] = 0.299 * data[i*4] + 0.587 * data[i*4+1] + 0.114 * data[i*4+2];
  }

  // Gaussian blur 3x3
  const blurred = new Float32Array(w * h);
  const kernel = [1,2,1,2,4,2,1,2,1];
  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      let sum = 0;
      for (let ky = -1; ky <= 1; ky++) {
        for (let kx = -1; kx <= 1; kx++) {
          sum += gray[(y+ky)*w + (x+kx)] * kernel[(ky+1)*3 + (kx+1)];
        }
      }
      blurred[y*w+x] = sum / 16;
    }
  }

  // Sobel gradients
  const gx = new Float32Array(w * h);
  const gy = new Float32Array(w * h);
  const mag = new Float32Array(w * h);
  const dir = new Float32Array(w * h);
  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      const idx = y*w+x;
      gx[idx] = -blurred[(y-1)*w+x-1] + blurred[(y-1)*w+x+1]
               -2*blurred[y*w+x-1] + 2*blurred[y*w+x+1]
               -blurred[(y+1)*w+x-1] + blurred[(y+1)*w+x+1];
      gy[idx] = -blurred[(y-1)*w+x-1] -2*blurred[(y-1)*w+x]  -blurred[(y-1)*w+x+1]
               +blurred[(y+1)*w+x-1] +2*blurred[(y+1)*w+x]  +blurred[(y+1)*w+x+1];
      mag[idx] = Math.sqrt(gx[idx]*gx[idx] + gy[idx]*gy[idx]);
      dir[idx] = Math.atan2(gy[idx], gx[idx]);
    }
  }

  // Non-maximum suppression
  const nms = new Float32Array(w * h);
  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      const idx = y*w+x;
      let angle = dir[idx] * 180 / Math.PI;
      if (angle < 0) angle += 180;
      let n1 = 0, n2 = 0;
      if (angle < 22.5 || angle >= 157.5) { n1 = mag[y*w+x+1]; n2 = mag[y*w+x-1]; }
      else if (angle < 67.5) { n1 = mag[(y-1)*w+x+1]; n2 = mag[(y+1)*w+x-1]; }
      else if (angle < 112.5) { n1 = mag[(y-1)*w+x]; n2 = mag[(y+1)*w+x]; }
      else { n1 = mag[(y-1)*w+x-1]; n2 = mag[(y+1)*w+x+1]; }
      nms[idx] = (mag[idx] >= n1 && mag[idx] >= n2) ? mag[idx] : 0;
    }
  }

  // Double threshold + hysteresis
  let maxMag = 0;
  for (let i = 0; i < nms.length; i++) if (nms[i] > maxMag) maxMag = nms[i];
  const highT = maxMag * 0.15;
  const lowT = highT * 0.4;

  const edge = new Uint8Array(w * h);
  // Strong edges
  for (let i = 0; i < w*h; i++) {
    if (nms[i] >= highT) edge[i] = 2;
    else if (nms[i] >= lowT) edge[i] = 1;
  }
  // Hysteresis: promote weak edges connected to strong
  let changed = true;
  while (changed) {
    changed = false;
    for (let y = 1; y < h-1; y++) {
      for (let x = 1; x < w-1; x++) {
        if (edge[y*w+x] === 1) {
          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              if (edge[(y+dy)*w+x+dx] === 2) {
                edge[y*w+x] = 2;
                changed = true;
              }
            }
          }
        }
      }
    }
  }

  // Collect edge points
  const edgePoints = [];
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      if (edge[y*w+x] === 2) edgePoints.push({ x, y });
    }
  }

  if (edgePoints.length === 0) return [];

  // Order points: greedy nearest-neighbor
  const ordered = orderPoints(edgePoints);

  // Center and scale to screen
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const drawScale = Math.min(window.innerWidth, window.innerHeight) * 0.7 / Math.max(w, h);
  const ox = cx - (w * drawScale) / 2;
  const oy = cy - (h * drawScale) / 2;

  return ordered.map(p => ({
    x: ox + p.x * drawScale,
    y: oy + p.y * drawScale
  }));
}

// ============================================================
// Path ordering (greedy nearest-neighbor)
// ============================================================
function orderPoints(points) {
  const n = points.length;
  if (n <= 2) return points;

  // Subsample if too many points for O(n^2) greedy
  let pts = points;
  if (n > 3000) {
    const step = Math.ceil(n / 3000);
    pts = points.filter((_, i) => i % step === 0);
  }

  const used = new Uint8Array(pts.length);
  const order = [0];
  used[0] = 1;

  for (let i = 1; i < pts.length; i++) {
    const last = pts[order[order.length - 1]];
    let bestD = Infinity, bestJ = 0;
    for (let j = 0; j < pts.length; j++) {
      if (used[j]) continue;
      const dx = pts[j].x - last.x, dy = pts[j].y - last.y;
      const d = dx*dx + dy*dy;
      if (d < bestD) { bestD = d; bestJ = j; }
    }
    order.push(bestJ);
    used[bestJ] = 1;
  }

  let result = order.map(i => pts[i]);

  // 2-opt improvement
  result = twoOpt(result);

  return result;
}

function dist2(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return dx * dx + dy * dy;
}

function twoOpt(path) {
  const n = path.length;
  if (n < 4) return path;
  // Cap iterations for performance; for large paths, limit passes
  const maxPasses = n > 1000 ? 3 : 10;
  let improved = true;
  let passes = 0;

  while (improved && passes < maxPasses) {
    improved = false;
    passes++;
    for (let i = 0; i < n - 2; i++) {
      for (let j = i + 2; j < n - 1; j++) {
        // Current edges: (i, i+1) and (j, j+1)
        // Proposed: (i, j) and (i+1, j+1) -- reverse segment [i+1..j]
        const d1 = dist2(path[i], path[i+1]) + dist2(path[j], path[j+1]);
        const d2 = dist2(path[i], path[j]) + dist2(path[i+1], path[j+1]);
        if (d2 < d1) {
          // Reverse the segment between i+1 and j
          let lo = i + 1, hi = j;
          while (lo < hi) {
            const tmp = path[lo];
            path[lo] = path[hi];
            path[hi] = tmp;
            lo++; hi--;
          }
          improved = true;
        }
      }
    }
  }
  return path;
}

// ============================================================
// Path resampling
// ============================================================
function resamplePath(points, n) {
  if (points.length < 2) return points;

  // Compute cumulative arc length
  const lens = [0];
  for (let i = 1; i < points.length; i++) {
    const dx = points[i].x - points[i-1].x;
    const dy = points[i].y - points[i-1].y;
    lens.push(lens[i-1] + Math.sqrt(dx*dx + dy*dy));
  }
  const totalLen = lens[lens.length - 1];
  if (totalLen === 0) return points.slice(0, n);

  // Close the path: add distance from last to first
  const closeDx = points[0].x - points[points.length-1].x;
  const closeDy = points[0].y - points[points.length-1].y;
  const closeDist = Math.sqrt(closeDx*closeDx + closeDy*closeDy);
  const totalClosed = totalLen + closeDist;

  const result = [];
  for (let i = 0; i < n; i++) {
    const target = (i / n) * totalClosed;

    if (target <= totalLen) {
      // Interpolate along the original path
      let j = 1;
      while (j < lens.length - 1 && lens[j] < target) j++;
      const seg = lens[j] - lens[j-1];
      const t = seg > 0 ? (target - lens[j-1]) / seg : 0;
      result.push({
        x: points[j-1].x + t * (points[j].x - points[j-1].x),
        y: points[j-1].y + t * (points[j].y - points[j-1].y)
      });
    } else {
      // Interpolate closing segment
      const t = (target - totalLen) / closeDist;
      result.push({
        x: points[points.length-1].x + t * closeDx,
        y: points[points.length-1].y + t * closeDy
      });
    }
  }
  return result;
}

// ============================================================
// DFT
// ============================================================
function computeDFT(points) {
  const N = points.length;
  const result = [];
  // Center the path
  let cx = 0, cy = 0;
  for (const p of points) { cx += p.x; cy += p.y; }
  cx /= N; cy /= N;

  for (let k = 0; k < N; k++) {
    let re = 0, im = 0;
    for (let n = 0; n < N; n++) {
      const angle = (2 * Math.PI * k * n) / N;
      re += (points[n].x - cx) * Math.cos(angle) + (points[n].y - cy) * Math.sin(angle);
      im += (points[n].y - cy) * Math.cos(angle) - (points[n].x - cx) * Math.sin(angle);
    }
    re /= N;
    im /= N;
    const amp = Math.sqrt(re*re + im*im);
    const phase = Math.atan2(im, re);
    // Map frequency: 0, 1, -1, 2, -2, ...
    let freq;
    if (k === 0) freq = 0;
    else if (k <= N/2) freq = k;
    else freq = k - N;
    result.push({ freq, amp, phase, re, im });
  }

  // Sort by amplitude descending
  result.sort((a, b) => b.amp - a.amp);
  return result;
}

// Store raw coefficients for optimization
let rawCoefficients = [];
let optimIterations = 0;

// ============================================================
// Optimization: gradient descent on amplitudes & phases
// ============================================================
function runOptimization(targetIter) {
  if (targetIter <= optimIterations) {
    // Reset to raw and re-run up to targetIter
    coefficients = rawCoefficients.map(c => ({ ...c }));
    optimIterations = 0;
  }

  const itersToRun = targetIter - optimIterations;
  if (itersToRun <= 0) return;

  // Get the target points from raw coefficients (use all of them as ground truth)
  const N = 512;
  const targetPoints = synthesizePath(rawCoefficients, rawCoefficients.length, N);

  // Work on the active subset
  const active = coefficients.slice(0, Math.min(numCircles, coefficients.length));
  const lr = 0.001;

  for (let iter = 0; iter < itersToRun; iter++) {
    // Compute current path with active coefficients
    const current = synthesizePath(active, active.length, N);

    // Compute Chamfer-like gradient: for each current point, find nearest target point
    for (let ci = 0; ci < active.length; ci++) {
      let gradAmp = 0, gradPhase = 0;
      const c = active[ci];

      for (let i = 0; i < N; i++) {
        const t = i / N;
        const angle = 2 * Math.PI * c.freq * t + c.phase;

        // Find nearest target point
        let minD = Infinity, nearIdx = 0;
        for (let j = 0; j < N; j++) {
          const dx = current[i].x - targetPoints[j].x;
          const dy = current[i].y - targetPoints[j].y;
          const d = dx*dx + dy*dy;
          if (d < minD) { minD = d; nearIdx = j; }
        }

        const errX = current[i].x - targetPoints[nearIdx].x;
        const errY = current[i].y - targetPoints[nearIdx].y;

        // d(x)/d(amp) = cos(angle), d(y)/d(amp) = sin(angle)
        gradAmp += errX * Math.cos(angle) + errY * Math.sin(angle);
        // d(x)/d(phase) = -amp*sin(angle), d(y)/d(phase) = amp*cos(angle)
        gradPhase += errX * (-c.amp * Math.sin(angle)) + errY * (c.amp * Math.cos(angle));
      }

      gradAmp /= N;
      gradPhase /= N;

      c.amp -= lr * gradAmp;
      c.phase -= lr * gradPhase;
      if (c.amp < 0) c.amp = 0;
      c.re = c.amp * Math.cos(c.phase);
      c.im = c.amp * Math.sin(c.phase);
    }

    // Frequency swapping every 50 iterations: try replacing weakest active
    // coefficient with an unused frequency from the full set
    if ((optimIterations + iter + 1) % 50 === 0 && active.length > 2) {
      const currentErr = chamferError(current, targetPoints);
      // Find weakest active coefficient (skip DC term at freq 0)
      let weakIdx = -1, weakAmp = Infinity;
      for (let ci = 0; ci < active.length; ci++) {
        if (active[ci].freq === 0) continue;
        if (active[ci].amp < weakAmp) { weakAmp = active[ci].amp; weakIdx = ci; }
      }
      if (weakIdx >= 0) {
        // Find unused frequencies
        const activeFreqs = new Set(active.map(c => c.freq));
        const candidates = rawCoefficients.filter(c => !activeFreqs.has(c.freq));
        // Try top 5 unused by raw amplitude
        const topCandidates = candidates.slice(0, 5);
        let bestSwap = null, bestErr = currentErr;
        const saved = active[weakIdx];
        for (const cand of topCandidates) {
          active[weakIdx] = { ...cand };
          const trial = synthesizePath(active, active.length, N);
          const err = chamferError(trial, targetPoints);
          if (err < bestErr) { bestErr = err; bestSwap = { ...cand }; }
        }
        active[weakIdx] = bestSwap || saved;
      }
    }

    // Write back
    for (let i = 0; i < active.length; i++) {
      coefficients[i] = active[i];
    }
  }

  optimIterations = targetIter;
  trail = [];
  animTime = 0;
}

function chamferError(pathA, pathB) {
  let total = 0;
  for (let i = 0; i < pathA.length; i++) {
    let minD = Infinity;
    for (let j = 0; j < pathB.length; j++) {
      const dx = pathA[i].x - pathB[j].x, dy = pathA[i].y - pathB[j].y;
      const d = dx * dx + dy * dy;
      if (d < minD) minD = d;
    }
    total += minD;
  }
  return total;
}

// ============================================================
// Synthesize path from coefficients
// ============================================================
function synthesizePath(coeffs, n, numPoints) {
  const points = [];
  const useN = Math.min(n, coeffs.length);
  for (let i = 0; i < numPoints; i++) {
    const t = i / numPoints;
    let x = 0, y = 0;
    for (let j = 0; j < useN; j++) {
      const c = coeffs[j];
      const angle = 2 * Math.PI * c.freq * t + c.phase;
      x += c.amp * Math.cos(angle);
      y += c.amp * Math.sin(angle);
    }
    points.push({ x, y });
  }
  return points;
}

// ============================================================
// Epicycle computation at time t
// ============================================================
function computeEpicycles(t, n) {
  const useN = Math.min(n, coefficients.length);
  const circles = [];
  let x = 0, y = 0;

  // Find center offset (from the drawing's center)
  const pts = drawingPoints.length > 0 ? drawingPoints : [];
  let cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  if (pts.length > 0) {
    cx = 0; cy = 0;
    for (const p of pts) { cx += p.x; cy += p.y; }
    cx /= pts.length; cy /= pts.length;
  }

  for (let i = 0; i < useN; i++) {
    const c = coefficients[i];
    const angle = 2 * Math.PI * c.freq * t + c.phase;
    const px = x, py = y;
    x += c.amp * Math.cos(angle);
    y += c.amp * Math.sin(angle);
    circles.push({
      cx: px + cx, cy: py + cy,
      r: c.amp,
      x: x + cx, y: y + cy
    });
  }

  return { circles, tipX: x + cx, tipY: y + cy };
}

// ============================================================
// Render loop
// ============================================================
let lastTime = 0;

function render(timestamp) {
  const dt = lastTime ? (timestamp - lastTime) / 1000 : 0;
  lastTime = timestamp;

  ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

  if (mode === 'draw' && isDrawing && drawingPoints.length > 1) {
    // Draw the current stroke
    ctx.beginPath();
    ctx.moveTo(drawingPoints[0].x, drawingPoints[0].y);
    for (let i = 1; i < drawingPoints.length; i++) {
      ctx.lineTo(drawingPoints[i].x, drawingPoints[i].y);
    }
    ctx.strokeStyle = '#4a9eff';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  if (mode === 'animate' && coefficients.length > 0) {
    if (animPlaying) {
      animTime += dt * (animSpeed / 50);
      if (animTime >= 1) animTime -= 1;
    }

    const { circles, tipX, tipY } = computeEpicycles(animTime, numCircles);

    // Apply zoom transform (zoom around screen center)
    ctx.save();
    const zcx = window.innerWidth / 2, zcy = window.innerHeight / 2;
    ctx.translate(zcx, zcy);
    ctx.scale(viewZoom, viewZoom);
    ctx.translate(-zcx, -zcy);

    // Draw circles
    ctx.globalAlpha = 0.25;
    for (const c of circles) {
      ctx.beginPath();
      ctx.arc(c.cx, c.cy, c.r, 0, 2 * Math.PI);
      ctx.strokeStyle = '#335577';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Radius line
      ctx.beginPath();
      ctx.moveTo(c.cx, c.cy);
      ctx.lineTo(c.x, c.y);
      ctx.strokeStyle = '#4477aa';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Original path overlay
    if (showOverlay && originalPath.length > 1) {
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.moveTo(originalPath[0].x, originalPath[0].y);
      for (let i = 1; i < originalPath.length; i++) {
        ctx.lineTo(originalPath[i].x, originalPath[i].y);
      }
      ctx.closePath();
      ctx.strokeStyle = '#ff4a4a';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // Trail
    if (animPlaying) {
      trail.push({ x: tipX, y: tipY });
      if (trail.length > MAX_TRAIL) trail.shift();
    }

    if (trail.length > 1) {
      if (trailFade === 0) {
        // No fade: draw entire trail at full opacity
        ctx.beginPath();
        ctx.moveTo(trail[0].x, trail[0].y);
        for (let i = 1; i < trail.length; i++) {
          ctx.lineTo(trail[i].x, trail[i].y);
        }
        ctx.strokeStyle = '#4a9eff';
        ctx.lineWidth = 2;
        ctx.stroke();
      } else {
        // Fade: older segments fade out
        // trailFade=80 means fully faded at 80% back from the tip
        // trailFade=100 means only the very tip is visible
        const fadeLen = Math.max(1, Math.floor(trail.length * (1 - trailFade / 100)));
        const startIdx = Math.max(0, trail.length - fadeLen);
        const visibleLen = trail.length - startIdx;

        // Batch segments by alpha to reduce draw calls (16 alpha buckets)
        const BUCKETS = 16;
        for (let b = 0; b < BUCKETS; b++) {
          const segStart = startIdx + Math.floor((b / BUCKETS) * visibleLen);
          const segEnd = startIdx + Math.floor(((b + 1) / BUCKETS) * visibleLen);
          if (segEnd <= segStart + 1) continue;

          const alpha = (b + 1) / BUCKETS;
          ctx.globalAlpha = alpha;
          ctx.beginPath();
          ctx.moveTo(trail[segStart].x, trail[segStart].y);
          for (let i = segStart + 1; i < segEnd; i++) {
            ctx.lineTo(trail[i].x, trail[i].y);
          }
          ctx.strokeStyle = '#4a9eff';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }
    }

    // Tip dot
    ctx.beginPath();
    ctx.arc(tipX, tipY, 3, 0, 2 * Math.PI);
    ctx.fillStyle = '#fff';
    ctx.fill();

    ctx.restore(); // end zoom transform

    // Spectrum view
    if (showSpectrum && coefficients.length > 0) {
      const specW = 240, specH = 120, pad = 12;
      const sx = window.innerWidth - specW - pad;
      const sy = window.innerHeight - specH - pad - 20;

      ctx.fillStyle = 'rgba(10, 10, 10, 0.85)';
      ctx.fillRect(sx - 4, sy - 4, specW + 8, specH + 8);
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 1;
      ctx.strokeRect(sx - 4, sy - 4, specW + 8, specH + 8);

      const n = Math.min(numCircles, coefficients.length);
      const sorted = coefficients.slice(0, n).slice().sort((a, b) => a.freq - b.freq);
      const maxAmp = sorted.reduce((m, c) => Math.max(m, c.amp), 0.001);
      const barW = Math.max(1, (specW - 2) / sorted.length);

      for (let i = 0; i < sorted.length; i++) {
        const h = (sorted[i].amp / maxAmp) * (specH - 14);
        const bx = sx + 1 + i * barW;
        const by = sy + specH - 2 - h;
        ctx.fillStyle = '#4a9eff';
        ctx.fillRect(bx, by, Math.max(1, barW - 1), h);
      }

      ctx.fillStyle = '#555';
      ctx.font = '9px monospace';
      ctx.fillText('freq', sx + 2, sy + specH + 0);
      ctx.fillText('amp', sx + specW - 20, sy + 8);
    }

    // Info
    $('info').textContent = `circles: ${Math.min(numCircles, coefficients.length)} / ${coefficients.length}  |  t: ${animTime.toFixed(3)}  |  optim: ${optimIterations}`;
  }

  requestAnimationFrame(render);
}

requestAnimationFrame(render);

// ============================================================
// URL hash: encode/decode coefficients
// ============================================================

// Binary encoding: for each coefficient, pack freq (zigzag varint),
// amplitude (float16, 2 bytes), phase (uint16 mapped to [0, 2pi), 2 bytes)
// Then pako deflate and base64url encode.

function zigzagEncode(n) { return (n << 1) ^ (n >> 31); }
function zigzagDecode(n) { return (n >>> 1) ^ -(n & 1); }

function writeVarint(bytes, val) {
  val = val >>> 0;
  while (val > 0x7f) { bytes.push((val & 0x7f) | 0x80); val >>>= 7; }
  bytes.push(val & 0x7f);
}

function readVarint(bytes, offset) {
  let val = 0, shift = 0, b;
  do {
    b = bytes[offset.pos++];
    val |= (b & 0x7f) << shift;
    shift += 7;
  } while (b & 0x80);
  return val;
}

// Float16 encode/decode (IEEE 754 half precision)
function toFloat16(val) {
  const buf = new ArrayBuffer(4);
  new Float32Array(buf)[0] = val;
  const f32 = new Uint32Array(buf)[0];
  const sign = (f32 >> 16) & 0x8000;
  const exp = ((f32 >> 23) & 0xff) - 127 + 15;
  const frac = (f32 >> 13) & 0x3ff;
  if (exp <= 0) return sign; // underflow to zero
  if (exp >= 31) return sign | 0x7c00; // overflow to inf
  return sign | (exp << 10) | frac;
}

function fromFloat16(h) {
  const sign = (h & 0x8000) >> 15;
  const exp = (h & 0x7c00) >> 10;
  const frac = h & 0x03ff;
  if (exp === 0) return (sign ? -1 : 1) * (frac / 1024) * Math.pow(2, -14);
  if (exp === 31) return frac ? NaN : (sign ? -Infinity : Infinity);
  return (sign ? -1 : 1) * Math.pow(2, exp - 15) * (1 + frac / 1024);
}

// Base64url encode/decode
function base64urlEncode(uint8) {
  let s = '';
  for (let i = 0; i < uint8.length; i++) s += String.fromCharCode(uint8[i]);
  return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

function base64urlDecode(str) {
  str = str.replace(/-/g, '+').replace(/_/g, '/');
  while (str.length % 4) str += '=';
  const bin = atob(str);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

function encodeCoefficients(coeffs) {
  const bytes = [];
  for (const c of coeffs) {
    writeVarint(bytes, zigzagEncode(c.freq));
    const a16 = toFloat16(c.amp);
    bytes.push(a16 & 0xff, (a16 >> 8) & 0xff);
    const p16 = Math.round(((c.phase % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI)) / (2 * Math.PI) * 65535);
    bytes.push(p16 & 0xff, (p16 >> 8) & 0xff);
  }
  const compressed = pako.deflate(new Uint8Array(bytes));
  return base64urlEncode(compressed);
}

function decodeCoefficients(str) {
  const compressed = base64urlDecode(str);
  const bytes = pako.inflate(compressed);
  const coeffs = [];
  const offset = { pos: 0 };
  while (offset.pos < bytes.length) {
    const freq = zigzagDecode(readVarint(bytes, offset));
    if (offset.pos + 4 > bytes.length) break;
    const a16 = bytes[offset.pos] | (bytes[offset.pos + 1] << 8);
    offset.pos += 2;
    const p16 = bytes[offset.pos] | (bytes[offset.pos + 1] << 8);
    offset.pos += 2;
    const amp = fromFloat16(a16);
    const phase = (p16 / 65535) * 2 * Math.PI;
    coeffs.push({
      freq, amp, phase,
      re: amp * Math.cos(phase),
      im: amp * Math.sin(phase)
    });
  }
  return coeffs;
}

function loadCoefficients(coeffs) {
  if (coeffs.length === 0) return;
  coefficients = coeffs;
  rawCoefficients = coeffs.map(c => ({ ...c }));
  optimIterations = 0;
  mode = 'animate';
  animTime = 0;
  trail = [];
  animPlaying = true;
  drawingPoints = [{ x: window.innerWidth / 2, y: window.innerHeight / 2 }];
  numCircles = coefficients.length;
  showAnimControls(coefficients.length);
}

function tryLoadFromHash() {
  const hash = location.hash.slice(1);
  if (!hash) return;

  // Human-readable: h=f:a:p,f:a:p,...
  if (hash.startsWith('h=')) {
    const parts = hash.slice(2).split(',');
    const coeffs = parts.map(s => {
      const [f, a, p] = s.split(':').map(Number);
      return {
        freq: f, amp: a, phase: p,
        re: a * Math.cos(p), im: a * Math.sin(p)
      };
    }).filter(c => !isNaN(c.freq));
    loadCoefficients(coeffs);
  }

  // Binary compressed: c=<base64url pako-compressed>
  if (hash.startsWith('c=')) {
    try {
      const coeffs = decodeCoefficients(hash.slice(2));
      loadCoefficients(coeffs);
    } catch (e) {
      console.error('Failed to decode coefficients from URL:', e);
    }
  }
}

tryLoadFromHash();
window.addEventListener('hashchange', tryLoadFromHash);
</script>
